<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - Painel ADM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 700px;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-btn {
            flex: 1;
            padding: 20px 10px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn i {
            font-size: 18px;
            transition: all 0.4s ease;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 80%;
            height: 3px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 3px 3px 0 0;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-btn.active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        .tab-btn.active::before {
            transform: translateX(-50%) scaleX(1);
        }

        .tab-btn.active i {
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.6));
        }

        .tab-content {
            padding: 30px;
            color: white;
            position: relative;
            min-height: 400px;
        }

        .tab-pane {
            display: none;
            animation: fadeSlideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeSlideIn {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 24px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
        }

        .card-vaga {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            position: relative;
        }

        .card-vaga:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card-vaga h3 {
            color: #00d2ff;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .card-vaga p {
            margin: 5px 0;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .whatsapp-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 24px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            letter-spacing: 0.5px;
        }

        .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.5);
            background: linear-gradient(135deg, #1da851, #0e6b56);
        }

        .whatsapp-btn:active {
            transform: translateY(0);
        }

        .admin-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .admin-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            width: 90%;
            max-width: 500px;
            color: white;
            animation: slideUp 0.4s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content-admin {
            max-width: 700px;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h2 {
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.3px;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #3a7bd5;
            box-shadow: 0 0 0 4px rgba(58, 123, 213, 0.15);
            background: rgba(255, 255, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
            margin-bottom: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .delete-btn {
            background: rgba(255, 0, 0, 0.2);
            border: none;
            color: #ff4444;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .delete-btn:hover {
            background: rgba(255, 0, 0, 0.4);
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }

        .vaga-item-admin {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .vaga-item-admin:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .vaga-info-admin {
            flex: 1;
        }

        .vaga-info-admin h4 {
            color: #00d2ff;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .vaga-info-admin p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin: 2px 0;
        }

        .admin-section {
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        .admin-section h3 {
            color: #00d2ff;
            margin-bottom: 15px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(37, 211, 102, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 500;
            z-index: 2000;
            animation: slideInRight 0.5s ease, slideOutRight 0.5s ease 2.5s forwards;
            backdrop-filter: blur(10px);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        @media (max-width: 500px) {
            .tab-btn {
                font-size: 13px;
                padding: 16px 6px;
            }
            .tab-btn i {
                font-size: 16px;
            }
            .tab-content {
                padding: 20px;
            }
            .admin-btn {
                bottom: 20px;
                right: 20px;
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            .vaga-item-admin {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="cursos">
                <span>📚</span> Cursos
            </button>
            <button class="tab-btn" data-tab="clt">
                <span>💼</span> CLT
            </button>
            <button class="tab-btn" data-tab="diarias">
                <span>📅</span> Diárias
            </button>
            <button class="tab-btn" data-tab="freelancer">
                <span>🚀</span> Freelancer
            </button>
        </div>

        <div class="tab-content">
            <!-- Aba Cursos -->
            <div class="tab-pane active" id="cursos">
                <h2>📚 Cursos Disponíveis</h2>
                <div id="listaCursos"></div>
            </div>

            <!-- Aba CLT -->
            <div class="tab-pane" id="clt">
                <h2>💼 Vagas CLT</h2>
                <div id="listaCLT"></div>
            </div>

            <!-- Aba Diárias -->
            <div class="tab-pane" id="diarias">
                <h2>📅 Diárias</h2>
                <div id="listaDiarias"></div>
            </div>

            <!-- Aba Freelancer -->
            <div class="tab-pane" id="freelancer">
                <h2>🚀 Projetos Freelancer</h2>
                <div id="listaFreelancer"></div>
            </div>
        </div>
    </div>

    <!-- Botão Admin discreto -->
    <button class="admin-btn" onclick="abrirLogin()" title="Painel ADM">⚙️</button>

    <!-- Modal de Login -->
    <div id="modalLogin" class="modal">
        <div class="modal-content">
            <h2>🔐 Acesso Administrativo</h2>
            <div class="input-group">
                <label>Login</label>
                <input type="text" id="loginInput" placeholder="Digite o login">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senhaInput" placeholder="Digite a senha">
            </div>
            <button onclick="fazerLogin()">Entrar</button>
            <button class="close-btn" onclick="fecharModal('modalLogin')">Cancelar</button>
            <p id="msgErro" style="color: #ff4444; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <!-- Modal do Painel ADM -->
    <div id="modalADM" class="modal">
        <div class="modal-content modal-content-admin">
            <h2>⚙️ Painel Administrativo</h2>
            
            <!-- Seção de Lançamento -->
            <div class="admin-section">
                <h3>🚀 Lançar Nova Vaga</h3>
                <div class="input-group">
                    <label>Tipo de Vaga</label>
                    <select id="tipoVaga">
                        <option value="cursos">📚 Curso</option>
                        <option value="clt">💼 CLT</option>
                        <option value="diarias">📅 Diária</option>
                        <option value="freelancer">🚀 Freelancer</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Nome da Vaga/Curso</label>
                    <input type="text" id="nomeVaga" placeholder="Ex: Desenvolvedor React">
                </div>
                <div class="input-group">
                    <label>Nome da Empresa/Instituição</label>
                    <input type="text" id="empresaVaga" placeholder="Ex: Tech Solutions Ltda">
                </div>
                <div class="input-group">
                    <label>Valor (R$)</label>
                    <input type="number" id="valorVaga" placeholder="Ex: 5000.00" step="0.01">
                </div>
                <div class="input-group">
                    <label>Carga Horária / Horas</label>
                    <input type="text" id="horasVaga" placeholder="Ex: 40h semanais ou 20h totais">
                </div>
                <div class="input-group">
                    <label>WhatsApp do Empregador</label>
                    <input type="text" id="whatsappVaga" placeholder="Ex: (11) 99999-9999">
                </div>
                <button onclick="lancarVaga()">🚀 Lançar Vaga</button>
            </div>

            <!-- Seção de Gerenciamento -->
            <div class="admin-section">
                <h3>🗑️ Gerenciar Vagas (Excluir)</h3>
                <div id="listaAdminVagas"></div>
            </div>

            <button class="close-btn" onclick="fecharModal('modalADM')">Fechar Painel</button>
        </div>
    </div>

    <script>
        // Dados armazenados
        let vagas = {
            cursos: [],
            clt: [],
            diarias: [],
            freelancer: []
        };

        // Carregar dados salvos ao iniciar
        function carregarDados() {
            const dadosSalvos = localStorage.getItem('vagasSistema');
            if (dadosSalvos) {
                vagas = JSON.parse(dadosSalvos);
            }
            atualizarTodasListas();
        }

        // Salvar dados automaticamente
        function salvarDados() {
            localStorage.setItem('vagasSistema', JSON.stringify(vagas));
            mostrarNotificacao('💾 Dados salvos com sucesso!');
        }

        // Mostrar notificação
        function mostrarNotificacao(mensagem) {
            const notificacao = document.createElement('div');
            notificacao.className = 'notification';
            notificacao.textContent = mensagem;
            document.body.appendChild(notificacao);
            
            setTimeout(() => {
                notificacao.remove();
            }, 3000);
        }

        // Gerar mensagem personalizada para WhatsApp
        function gerarMensagemWhatsApp(tipo, vaga) {
            const data = new Date().toLocaleDateString('pt-BR');
            const hora = new Date().toLocaleTimeString('pt-BR');
            
            switch(tipo) {
                case 'cursos':
                    return `Olá! Tenho interesse no curso *${vaga.nome}* da instituição *${vaga.empresa}*.\n\n` +
                           `📅 Data do contato: ${data}\n` +
                           `🕐 Horário: ${hora}\n\n` +
                           `Poderia me passar mais informações sobre:\n` +
                           `• Conteúdo programático\n` +
                           `• Formas de pagamento\n` +
                           `• Datas de início\n\n` +
                           `Aguardo seu retorno! 📚`;
                           
                case 'clt':
                    return `Olá! Tenho interesse na vaga CLT de *${vaga.nome}* na empresa *${vaga.empresa}*.\n\n` +
                           `📅 Data da candidatura: ${data}\n` +
                           `🕐 Horário: ${hora}\n\n` +
                           `Gostaria de saber mais sobre:\n` +
                           `• Benefícios oferecidos\n` +
                           `• Requisitos da vaga\n` +
                           `• Processo seletivo\n\n` +
                           `Estou disponível para uma entrevista! 💼`;
                           
                case 'diarias':
                    return `Olá! Tenho interesse nas diárias de *${vaga.nome}* na empresa *${vaga.empresa}*.\n\n` +
                           `📅 Data do contato: ${data}\n` +
                           `🕐 Horário: ${hora}\n\n` +
                           `Gostaria de saber:\n` +
                           `• Disponibilidade de datas\n` +
                           `• Local de trabalho\n` +
                           `• Condições de pagamento\n\n` +
                           `Aguardo seu retorno! 📅`;
                           
                case 'freelancer':
                    return `Olá! Tenho interesse no projeto freelancer *${vaga.nome}* da empresa *${vaga.empresa}*.\n\n` +
                           `📅 Data do contato: ${data}\n` +
                           `🕐 Horário: ${hora}\n\n` +
                           `Poderia me enviar mais detalhes sobre:\n` +
                           `• Escopo do projeto\n` +
                           `• Prazo de entrega\n` +
                           `• Tecnologias necessárias\n\n` +
                           `Estou disponível para conversarmos! 🚀`;
                           
                default:
                    return `Olá! Tenho interesse na oportunidade *${vaga.nome}*. Poderia me dar mais informações?`;
            }
        }

        // Atualizar listas da tela principal
        function atualizarTodasListas() {
            atualizarListaPrincipal('cursos', 'listaCursos', '📚');
            atualizarListaPrincipal('clt', 'listaCLT', '💼');
            atualizarListaPrincipal('diarias', 'listaDiarias', '📅');
            atualizarListaPrincipal('freelancer', 'listaFreelancer', '🚀');
        }

        function atualizarListaPrincipal(tipo, elementoId, icone) {
            const elemento = document.getElementById(elementoId);
            if (vagas[tipo].length === 0) {
                elemento.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">${icone}</div>
                        <p>Nenhuma vaga disponível no momento</p>
                    </div>
                `;
            } else {
                elemento.innerHTML = vagas[tipo].map((vaga, index) => {
                    const mensagem = gerarMensagemWhatsApp(tipo, vaga);
                    const whatsappNumber = vaga.whatsapp.replace(/\D/g, '');
                    const whatsappLink = `https://wa.me/55${whatsappNumber}?text=${encodeURIComponent(mensagem)}`;
                    
                    return `
                        <div class="card-vaga">
                            <h3>${vaga.nome}</h3>
                            <p><strong>🏢 Empresa:</strong> ${vaga.empresa}</p>
                            <p><strong>💰 Valor:</strong> R$ ${vaga.valor}</p>
                            <p><strong>⏱️ Horas:</strong> ${vaga.horas}</p>
                            <a href="${whatsappLink}" target="_blank" class="whatsapp-btn">
                                📱 Contatar via WhatsApp
                            </a>
                        </div>
                    `;
                }).join('');
            }
        }

        // Atualizar lista de vagas no painel ADM
        function atualizarListaAdmin() {
            const container = document.getElementById('listaAdminVagas');
            let html = '';
            
            for (const tipo in vagas) {
                const tipoNome = {
                    'cursos': '📚 Cursos',
                    'clt': '💼 CLT',
                    'diarias': '📅 Diárias',
                    'freelancer': '🚀 Freelancer'
                }[tipo];
                
                if (vagas[tipo].length > 0) {
                    html += `<h4 style="color: #00d2ff; margin-top: 15px;">${tipoNome}</h4>`;
                    vagas[tipo].forEach((vaga, index) => {
                        html += `
                            <div class="vaga-item-admin">
                                <div class="vaga-info-admin">
                                    <h4>${vaga.nome}</h4>
                                    <p>🏢 ${vaga.empresa} | 💰 R$ ${vaga.valor} | ⏱️ ${vaga.horas}</p>
                                    <p>📱 ${vaga.whatsapp}</p>
                                </div>
                                <button class="delete-btn" onclick="deletarVaga('${tipo}', ${index})">
                                    🗑️ Excluir
                                </button>
                            </div>
                        `;
                    });
                }
            }
            
            if (html === '') {
                html = '<p style="color: rgba(255,255,255,0.4); text-align: center; padding: 20px;">Nenhuma vaga cadastrada</p>';
            }
            
            container.innerHTML = html;
        }

        // Deletar vaga (apenas no painel ADM)
        function deletarVaga(tipo, index) {
            if (confirm(`Tem certeza que deseja excluir a vaga "${vagas[tipo][index].nome}"?`)) {
                vagas[tipo].splice(index, 1);
                salvarDados();
                atualizarTodasListas();
                atualizarListaAdmin();
                mostrarNotificacao('🗑️ Vaga excluída com sucesso!');
            }
        }

        // Sistema de abas
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabPanes = document.querySelectorAll('.tab-pane');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const targetTab = btn.getAttribute('data-tab');
                
                tabBtns.forEach(b => b.classList.remove('active'));
                tabPanes.forEach(p => p.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(targetTab).classList.add('active');
            });
        });

        // Funções do modal
        function abrirLogin() {
            document.getElementById('modalLogin').classList.add('active');
            document.getElementById('loginInput').value = '';
            document.getElementById('senhaInput').value = '';
            document.getElementById('msgErro').style.display = 'none';
        }

        function fecharModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function fazerLogin() {
            const login = document.getElementById('loginInput').value;
            const senha = document.getElementById('senhaInput').value;
            
            if (login === 'ADMJOSE' && senha === 'ADMJOSE') {
                document.getElementById('modalLogin').classList.remove('active');
                document.getElementById('modalADM').classList.add('active');
                document.getElementById('msgErro').style.display = 'none';
                atualizarListaAdmin(); // Atualiza a lista de vagas no painel
                mostrarNotificacao('✅ Login realizado com sucesso!');
            } else {
                document.getElementById('msgErro').style.display = 'block';
                document.getElementById('msgErro').textContent = '❌ Login ou senha incorretos!';
            }
        }

        function lancarVaga() {
            const tipo = document.getElementById('tipoVaga').value;
            const nome = document.getElementById('nomeVaga').value;
            const empresa = document.getElementById('empresaVaga').value;
            const valor = document.getElementById('valorVaga').value;
            const horas = document.getElementById('horasVaga').value;
            const whatsapp = document.getElementById('whatsappVaga').value;

            if (!nome || !empresa || !valor || !horas || !whatsapp) {
                alert('⚠️ Por favor, preencha todos os campos!');
                return;
            }

            vagas[tipo].push({
                nome: nome,
                empresa: empresa,
                valor: parseFloat(valor).toFixed(2),
                horas: horas,
                whatsapp: whatsapp
            });

            salvarDados();
            atualizarTodasListas();
            atualizarListaAdmin();
            
            // Limpar campos
            document.getElementById('nomeVaga').value = '';
            document.getElementById('empresaVaga').value = '';
            document.getElementById('valorVaga').value = '';
            document.getElementById('horasVaga').value = '';
            document.getElementById('whatsappVaga').value = '';

            mostrarNotificacao('✅ Vaga lançada com sucesso!');
        }

        // Fechar modais ao clicar fora
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });

        // Salvar dados quando o usuário sair da página
        window.addEventListener('beforeunload', function() {
            localStorage.setItem('vagasSistema', JSON.stringify(vagas));
        });

        // Salvar dados periodicamente (backup automático a cada 30 segundos)
        setInterval(() => {
            localStorage.setItem('vagasSistema', JSON.stringify(vagas));
        }, 30000);

        // Inicializar
        carregarDados();
    </script>
</body>
</html>
